# nginx.conf
# Configuración para Angular SPA — todas las rutas apuntan a index.html
# Colocar este archivo junto al docker-compose.yml

server {
    listen 80;
    server_name localhost;

    # Carpeta donde Nginx sirve los archivos compilados de Angular
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Cache para assets con hash (Angular los nombra con hash en build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing — cualquier ruta que no sea un archivo devuelve index.html
    # Esto permite que Angular maneje /dashboard, /productos, /cajas, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend — las peticiones a /api/ van al contenedor backend
    # Así el frontend llama a /api/... sin CORS y sin exponer el puerto del backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para peticiones lentas (reportes, etc.)
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Ocultar versión de Nginx en headers de respuesta
    server_tokens off;
}