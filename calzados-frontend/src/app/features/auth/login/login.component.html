<!-- src/app/features/auth/login/login.component.html -->
<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo-area">
        <mat-icon class="logo-icon">storefront</mat-icon>
        <h1>Calzados POS</h1>
        <p>Sistema de Punto de Venta</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width mb-2">
          <mat-label>Correo electrónico</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput type="email" formControlName="email"
                 placeholder="usuario@empresa.com" autocomplete="email">
          <mat-error>{{ emailError }}</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width mb-2">
          <mat-label>Contraseña</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password">
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            La contraseña es requerida
          </mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">
            Mínimo 6 caracteres
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                class="full-width login-btn" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20" class="btn-spinner"></mat-spinner>
          <span *ngIf="!loading">Iniciar sesión</span>
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
