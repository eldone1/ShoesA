<!-- src/app/features/productos/producto-dialog/producto-dialog.component.html -->
<h2 mat-dialog-title>{{ isEdit ? 'Editar' : 'Nuevo' }} Producto</h2>

<mat-dialog-content class="dialog-content">
  <form [formGroup]="form">

    <!-- Datos generales -->
    <div class="form-row">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Nombre del producto</mat-label>
        <input matInput formControlName="nombre">
        <mat-error *ngIf="form.get('nombre')?.hasError('required')">Requerido</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" style="width:200px">
        <mat-label>Marca</mat-label>
        <mat-select formControlName="marcaId">
          <mat-option [value]="null">Sin marca</mat-option>
          <mat-option *ngFor="let m of marcas" [value]="m.id">{{ m.nombre }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width mb-2">
      <mat-label>Descripción (opcional)</mat-label>
      <textarea matInput formControlName="descripcion" rows="2"></textarea>
    </mat-form-field>

    <mat-divider style="margin-bottom:16px"></mat-divider>

    <!-- Variantes -->
    <div class="variantes-header">
      <h3>Variantes</h3>
      <button mat-stroked-button type="button" (click)="addVariante()">
        <mat-icon>add</mat-icon> Agregar variante
      </button>
    </div>

    <div formArrayName="variantes">
      <mat-card class="variante-card" *ngFor="let v of variantes.controls; let i = index" [formGroupName]="i">

        <mat-card-header class="var-header">
          <mat-card-subtitle>Variante {{ i + 1 }}</mat-card-subtitle>
          <button mat-icon-button color="warn" type="button" (click)="removeVariante(i)"
                  [disabled]="variantes.length === 1" matTooltip="Eliminar variante">
            <mat-icon>close</mat-icon>
          </button>
        </mat-card-header>

        <mat-card-content>
          <div class="var-row">
            <mat-form-field appearance="outline">
              <mat-label>Talla</mat-label>
              <input matInput formControlName="talla" placeholder="38">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Color</mat-label>
              <input matInput formControlName="color" placeholder="Negro">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>SKU</mat-label>
              <input matInput formControlName="sku">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Código de barras</mat-label>
              <input matInput formControlName="codigoBarras">
            </mat-form-field>
          </div>

          <div class="var-row pricing-row">
            <mat-form-field appearance="outline">
              <mat-label>Precio compra</mat-label>
              <span matPrefix>S/&nbsp;</span>
              <input matInput type="number" min="0" step="0.01" formControlName="precioCompra">
              <mat-error *ngIf="v.get('precioCompra')?.hasError('required')">Requerido</mat-error>
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>% Ganancia</mat-label>
              <input matInput type="number" min="0" step="0.5" formControlName="porcentajeGanancia">
              <span matSuffix>%</span>
            </mat-form-field>
            <div class="precio-venta-preview">
              <span class="pv-label">Precio de venta</span>
              <span class="pv-value">{{ precioVentaPreview(v) }}</span>
            </div>
            <mat-form-field appearance="outline">
              <mat-label>Stock</mat-label>
              <input matInput type="number" min="0" formControlName="stock">
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Stock mínimo</mat-label>
              <input matInput type="number" min="0" formControlName="stockMinimo">
            </mat-form-field>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="loading">
    <mat-spinner *ngIf="loading" diameter="18" style="display:inline-block"></mat-spinner>
    {{ isEdit ? 'Actualizar' : 'Crear' }}
  </button>
</mat-dialog-actions>
