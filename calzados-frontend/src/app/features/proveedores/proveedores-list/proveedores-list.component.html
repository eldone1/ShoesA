<div class="page-container">
  <div class="page-header">
    <h1>Proveedores</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>person_add</mat-icon> Nuevo proveedor
    </button>
  </div>

  <mat-card class="search-card">
    <mat-card-content class="search-content">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Buscar por nombre o RUC</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [(ngModel)]="filtroQ" (keydown.enter)="loadProveedores()" placeholder="Ej: Andina o 2060..." />
      </mat-form-field>

      <mat-slide-toggle [(ngModel)]="incluirInactivos" (change)="loadProveedores()">
        Incluir inactivos
      </mat-slide-toggle>

      <button mat-raised-button color="primary" (click)="loadProveedores()">
        <mat-icon>search</mat-icon> Buscar
      </button>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-content>
      <div *ngIf="loading" class="spinner-center">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="proveedores" *ngIf="!loading">
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Proveedor</th>
          <td mat-cell *matCellDef="let p">
            <div><strong>{{ p.nombre }}</strong></div>
            <small>{{ p.email }}</small>
          </td>
        </ng-container>

        <ng-container matColumnDef="ruc">
          <th mat-header-cell *matHeaderCellDef>RUC</th>
          <td mat-cell *matCellDef="let p">{{ p.ruc }}</td>
        </ng-container>

        <ng-container matColumnDef="contacto">
          <th mat-header-cell *matHeaderCellDef>Contacto</th>
          <td mat-cell *matCellDef="let p">{{ p.contacto }}</td>
        </ng-container>

        <ng-container matColumnDef="telefono">
          <th mat-header-cell *matHeaderCellDef>Teléfono</th>
          <td mat-cell *matCellDef="let p">{{ p.numeroTelefono }}</td>
        </ng-container>

        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let p">
            <mat-slide-toggle [checked]="p.activo" (change)="toggleEstado(p)"></mat-slide-toggle>
          </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let p">
            <button mat-icon-button color="primary" (click)="openDialog(p)" matTooltip="Editar proveedor">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="accent" (click)="abrirCrearSolicitud(p)" matTooltip="Crear solicitud de compra">
              <mat-icon>post_add</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="abrirSolicitudes(p)" matTooltip="Ver solicitudes">
              <mat-icon>inventory_2</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <p *ngIf="!loading && proveedores.length === 0" class="empty-msg">
        No se encontraron proveedores.
      </p>
    </mat-card-content>
  </mat-card>
</div>
