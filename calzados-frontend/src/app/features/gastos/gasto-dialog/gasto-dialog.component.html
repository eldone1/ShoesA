<h2 mat-dialog-title>Nuevo gasto</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="grid-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tipo de gasto</mat-label>
      <mat-select formControlName="tipo">
        <mat-option *ngFor="let t of tipos" [value]="t">{{ t }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Concepto</mat-label>
      <input matInput formControlName="concepto" maxlength="180" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Monto</mat-label>
      <input matInput type="number" step="0.01" min="0.01" formControlName="monto" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha del gasto</mat-label>
      <input matInput type="date" formControlName="fechaGasto" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción (opcional)</mat-label>
      <textarea matInput rows="3" formControlName="descripcion"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="loading">
    Guardar gasto
  </button>
</mat-dialog-actions>
