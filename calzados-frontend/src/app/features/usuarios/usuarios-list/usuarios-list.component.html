<!-- src/app/features/usuarios/usuarios-list/usuarios-list.component.html -->
<div class="page-container">
  <div class="page-header">
    <h1>Usuarios</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>person_add</mat-icon> Nuevo usuario
    </button>
  </div>
  <mat-card>
    <mat-card-content>
      <div *ngIf="loading" class="spinner-center"><mat-spinner diameter="40"></mat-spinner></div>
      <table mat-table [dataSource]="users" *ngIf="!loading">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let u">{{ u.id }}</td>
        </ng-container>
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let u"><strong>{{ u.nombre }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let u">{{ u.email }}</td>
        </ng-container>
        <ng-container matColumnDef="rol">
          <th mat-header-cell *matHeaderCellDef>Rol</th>
          <td mat-cell *matCellDef="let u">
            <mat-chip [class]="u.rol === 'ADMIN' ? 'chip-tarjeta' : 'chip-yape'">{{ u.rol }}</mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let u">
            <mat-slide-toggle [checked]="u.activo" (change)="toggleEstado(u)" color="primary"></mat-slide-toggle>
          </td>
        </ng-container>
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let u">
            <button mat-icon-button color="primary" (click)="openDialog(u)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="cols"></tr>
        <tr mat-row *matRowDef="let row; columns: cols;"></tr>
      </table>
      <p *ngIf="!loading && users.length === 0" class="empty-msg">No hay usuarios.</p>
    </mat-card-content>
  </mat-card>
</div>
