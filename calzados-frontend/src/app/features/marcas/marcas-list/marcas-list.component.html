<!-- src/app/features/marcas/marcas-list/marcas-list.component.html -->
<div class="page-container">
  <div class="page-header">
    <h1>Marcas</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> Nueva marca
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div *ngIf="loading" class="spinner-center">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="marcas" *ngIf="!loading">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let m">{{ m.id }}</td>
        </ng-container>
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let m"><strong>{{ m.nombre }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let m">
            <mat-chip [class]="m.activo ? 'chip-activo' : 'chip-inactivo'">
              {{ m.activo ? 'Activo' : 'Inactivo' }}
            </mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let m">
            <button mat-icon-button color="primary" (click)="openDialog(m)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminar(m)" matTooltip="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <p *ngIf="!loading && marcas.length === 0" class="empty-msg">
        No hay marcas registradas.
      </p>
    </mat-card-content>
  </mat-card>
</div>
